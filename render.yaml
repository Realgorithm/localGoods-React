# This file defines the services and infrastructure for your application on Render.
# A single environment group to hold all generated secrets.
envGroups:
  - name: app-secrets
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true

services:
  # A private service for our MySQL database
  - type: pserv
    name: mysql-db
    image:
      url: mysql:8.0
    envVars:
      # The MySQL Docker image requires this variable to set the root password.
      # We pull the value from our shared environment group.
      - key: MYSQL_ROOT_PASSWORD
        fromEnvGroup: app-secrets
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 1
  # The backend API web service
  - type: web
    name: localgoods-api
    runtime: node
    buildCommand: "npm install"
    startCommand: "node server/index.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        fromService:
          type: pserv
          name: mysql-db
          property: host
      - key: DB_USER
        value: root
      # Pull the rest of the secrets from our shared environment group.
      - key: MYSQL_ROOT_PASSWORD
        fromEnvGroup: app-secrets
      - key: JWT_SECRET
        fromEnvGroup: app-secrets