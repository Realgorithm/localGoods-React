# This file defines the services and infrastructure for your application on Render.
# A single environment variable group to hold all generated secrets.
envVarGroups:
  - name: app-secrets
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true

services:
  # A private service for our MySQL database
  - type: pserv
    name: mysql-db
    image:
      url: mysql:8.0
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 1
    envVars:
      # This applies the 'app-secrets' group to this service,
      # which sets the MYSQL_ROOT_PASSWORD for the database.
      - fromGroup: app-secrets

  # The backend API web service
  - type: web
    name: localgoods-api
    runtime: node
    buildCommand: "npm install"
    startCommand: "node server/index.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        fromService:
          type: pserv
          name: mysql-db
          property: host
      - key: DB_USER
        value: root
      # This applies the 'app-secrets' group to this service,
      # providing it with both the JWT_SECRET and MYSQL_ROOT_PASSWORD.
      - fromGroup: app-secrets