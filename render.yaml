envGroups:
  - name: db-credentials
    envVars:
      # The MySQL Docker image specifically looks for MYSQL_ROOT_PASSWORD.
      # We generate it here and share it with both services.
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
  - name: app-secrets
    envVars:
      - key: JWT_SECRET
        generateValue: true

services:
  # A private service for our MySQL database
  - type: pserv
    name: mysql-db
    image:
      url: mysql:8.0
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        fromEnvGroup: db-credentials
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 1

  # The backend API web service
  - type: web
    name: localgoods-api
    runtime: node
    buildCommand: "npm install"
    startCommand: "node server/index.js"
    envVars:
      - key: NODE_ENV
        value: production
      # The DB host is discovered from the service name
      - key: DB_HOST
        fromService:
          type: pserv
          name: mysql-db
          property: host
      # The user is 'root' as defined by the MySQL image
      - key: DB_USER
        value: root
      # Pull secrets from the environment groups
      - key: MYSQL_ROOT_PASSWORD
        fromEnvGroup: db-credentials
      - key: JWT_SECRET
        fromEnvGroup: app-secrets