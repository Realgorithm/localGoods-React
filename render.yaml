# This file defines the services and infrastructure for your application on Render.
# A single environment variable group to hold all generated secrets.
envVarGroups:
  - name: app-secrets
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true

services:
  # A private service for our MySQL database
  - type: pserv
    name: mysql-db
    image:
      url: mysql:8.0
    # Apply the environment group to this service.
    # This service will now have MYSQL_ROOT_PASSWORD set.
    envVarGroups:
      - app-secrets
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 1

  # The backend API web service
  - type: web
    name: localgoods-api
    runtime: node
    buildCommand: "npm install"
    startCommand: "node server/index.js"
    # Apply the same environment group here.
    # This service will get both JWT_SECRET and MYSQL_ROOT_PASSWORD.
    envVarGroups:
      - app-secrets
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        fromService:
          type: pserv
          name: mysql-db
          property: host
      - key: DB_USER
        value: root